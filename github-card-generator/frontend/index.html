<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            background-color: #0d1117;
            font-family: 'Inter', sans-serif;
            color: #c9d1d9;
        }
        .glass {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(48, 54, 61, 1);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
            transition: all 0.2s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 160, 67, 0.3);
        }
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pulsing-skeleton {
            background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%);
            background-size: 200% 100%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">
    <div id="root" class="w-full max-w-[600px]"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [username, setUsername] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [copied, setCopied] = useState(false);

            const generateCard = async (e) => {
    e.preventDefault();
    if (!username) return;
    
    setLoading(true);
    setError(null);
    setResult(null);

    try {
        // This targets your secure Vercel Serverless Function instead of localhost
        const response = await fetch(`/api/generate-card?username=${username.trim()}`);

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'User not found or API error');
        }

        const data = await response.json();
        
        setResult({
            ...data,
            html: data.html,
            fullUrl: window.location.origin
        });
    } catch (err) {
        setError(err.message);
    } finally {
        setLoading(false);
    }
};

            const copyToClipboard = () => {
                if (!result) return;
                navigator.clipboard.writeText(result.fullUrl);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div class="space-y-8">
                    {/* Header */}
                    <div class="text-center space-y-2">
                        <h1 class="text-4xl font-bold text-white tracking-tight">GitHub Dev Card Generator</h1>
                        <p class="text-[#8b949e] text-lg">Enter any public GitHub username to reveal their vibe</p>
                    </div>

                    {/* Input Form */}
                    <form onSubmit={generateCard} class="glass p-6 rounded-xl shadow-xl flex gap-3">
                        <div class="relative flex-1">
                            <input 
                                type="text" 
                                placeholder="e.g. torvalds" 
                                value={username}
                                onChange={(e) => setUsername(e.target.value)}
                                class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-[#238636] transition-all"
                            />
                        </div>
                        <button 
                            type="submit"
                            disabled={loading || !username}
                            class="btn-gradient px-6 py-3 rounded-lg font-bold text-white disabled:opacity-50 disabled:cursor-not-allowed whitespace-nowrap"
                        >
                            {loading ? 'Generating...' : 'Generate Card'}
                        </button>
                    </form>

                    {/* Error State */}
                    {error && (
                        <div class="glass border-red-900/50 p-4 rounded-lg flex items-center gap-3 text-red-400 fade-in">
                            <span class="text-xl">⚠️</span>
                            <p>{error}</p>
                        </div>
                    )}

                    {/* Loading State */}
                    {loading && (
                        <div class="space-y-4 fade-in">
                            <div class="glass p-6 rounded-xl space-y-4">
                                <div class="flex items-center gap-4">
                                    <div class="w-16 h-16 rounded-full pulsing-skeleton"></div>
                                    <div class="space-y-2 flex-1">
                                        <div class="h-4 w-1/3 pulsing-skeleton rounded"></div>
                                        <div class="h-3 w-1/4 pulsing-skeleton rounded"></div>
                                    </div>
                                </div>
                                <div class="h-20 w-full pulsing-skeleton rounded"></div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="h-12 pulsing-skeleton rounded"></div>
                                    <div class="h-12 pulsing-skeleton rounded"></div>
                                </div>
                            </div>
                            <p class="text-center text-[#8b949e] animate-pulse">The agent is analyzing profile data...</p>
                        </div>
                    )}

                    {/* Result State */}
                    {result && (
                        <div class="space-y-6 fade-in">
                            <div class="flex justify-center">
                                {/* Injecting the HTML safely since we control the generator */}
                                <div 
                                    dangerouslySetInnerHTML={{ __html: result.html }} 
                                    class="shadow-2xl hover:scale-[1.02] transition-transform duration-300"
                                />
                            </div>

                            <div class="glass p-4 rounded-lg space-y-3">
                                <div class="text-sm text-[#8b949e] italic border-l-2 border-[#30363d] pl-4">
                                    {result.agent_narration}
                                </div>
                                <div class="flex items-center justify-between pt-2 border-t border-[#30363d]">
                                    <span class="text-xs text-[#8b949e]">Card saved successfully!</span>
                                    <button 
                                        onClick={copyToClipboard}
                                        class="text-sm font-semibold text-[#58a6ff] hover:text-blue-400 flex items-center gap-1 transition-colors"
                                    >
                                        {copied ? '✅ Copied URL' : '🔗 Copy Share Link'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
